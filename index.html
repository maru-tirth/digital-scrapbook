<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Scrapbook</title>
    <link rel="stylesheet" href="style.css">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@700&family=Poppins:wght@400;600&display=swap" rel="stylesheet">

    <!-- The script is deferred to run after the HTML is parsed -->
    <script src="script.js" defer></script>
</head>
<body>

    <!-- 1. Landing / Intro Page -->
    <section id="landing-view" class="view active">
        <div class="center-content">
            <h1 class="landing-title">Digital Scrapbook</h1>
            <p class="landing-subtitle">A collection of moments you have spent.</p>
            <button id="open-scrapbook-btn" class="cta-button">Open Scrapbook</button>
        </div>
    </section>

    <!-- 2. Digital Scrapbook View -->
    <section id="scrapbook-view" class="view">
        <div id="scrapbook-container">
            <!-- Pages will be dynamically generated here by JavaScript -->
        </div>
        <div class="scrapbook-nav">
            <button id="prev-page-btn" class="nav-button">&larr;</button>
            <div id="page-counter"></div>
            <button id="next-page-btn" class="nav-button">&rarr;</button>
        </div>
    </section>

    <!-- 3. Birthday Surprise View -->
    <section id="wall-view" class="view">
        <!-- Confetti Canvas -->
        <canvas id="confetti-canvas"></canvas>

        <!-- Floating Balloons -->
        <span class="balloon b1" title="Pop me!">🎈</span>
        <span class="balloon b2" title="Pop me!">🎈</span>
        <span class="balloon b3" title="Pop me!">🎈</span>
        <span class="balloon b4" title="Pop me!">🎈</span>
        <span class="balloon b5" title="Pop me!">🎈</span>
        <span class="balloon b6" title="Pop me!">🎈</span>

        <!-- Ambient Sparkles -->
        <div id="sparkles-container"></div>

        <!-- Main Birthday Content -->
        <div class="birthday-main">
            <h1 class="birthday-title">Happy Birthday! 🎂</h1>

            <!-- Interactive Cake -->
            <div class="birthday-cake" id="birthday-cake">
                <div id="candles-row"></div>
                <div class="cake-tier cake-top"></div>
                <div class="cake-tier cake-mid"></div>
                <div class="cake-tier cake-bot"></div>
            </div>

            <p class="blow-hint" id="blow-hint">Click the candles to blow them out! 🌬️</p>

            <div class="birthday-message-box">
                <p class="birthday-typewriter" id="birthday-typewriter"></p>
            </div>

            <button class="cta-button wish-btn" id="wish-btn">Make a Wish! ✨</button>
        </div>
    </section>

</body>
</html>
