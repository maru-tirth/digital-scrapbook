<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Memories</title>
    <link rel="shortcut icon" href="./public/favicon/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&family=Poppins:wght@400;600&display=swap" rel="stylesheet">

    <!-- Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <script src="script.js" defer></script>
</head>
<body>

    <!-- 1. Landing — Three.js fills the canvas, HTML sits on top -->
    <section id="landing-view" class="view active">
        <canvas id="three-canvas"></canvas>

        <div class="landing-overlay">
            <button id="open-scrapbook-btn" class="cta-button">Open Scrapbook 📖</button>
        </div>
    </section>

    <!-- 2. Scrapbook -->
    <section id="scrapbook-view" class="view">
        <div class="page-stack-left"></div>
        <div class="page-stack-right"></div>

        <div id="book-open-wrapper">
            <div class="book-spine-shadow"></div>
            <div id="scrapbook-container"></div>
        </div>

        <div class="scrapbook-nav">
            <button id="prev-page-btn" class="nav-button" aria-label="Previous">&larr;</button>
            <div id="page-counter"></div>
            <button id="next-page-btn" class="nav-button" aria-label="Next">&rarr;</button>
        </div>

        <!-- Progress strip -->
        <div class="progress-strip">
            <div class="progress-fill" id="progress-fill"></div>
        </div>
    </section>

    <!-- 3. Birthday Surprise -->
    <section id="wall-view" class="view">
        <button id="birthday-back-btn" class="nav-button birthday-back-btn">←</button>
        <canvas id="confetti-canvas"></canvas>
        <span class="balloon b1" title="Pop me!">🎈</span>
        <span class="balloon b2" title="Pop me!">🎈</span>
        <span class="balloon b3" title="Pop me!">🎈</span>
        <span class="balloon b4" title="Pop me!">🎈</span>
        <span class="balloon b5" title="Pop me!">🎈</span>
        <span class="balloon b6" title="Pop me!">🎈</span>
        <div id="sparkles-container"></div>
        <div class="birthday-main">
            <h1 class="birthday-title">Happy Birthday! 🎂</h1>
            <div class="birthday-cake" id="birthday-cake">
                <div id="candles-row"></div>
                <div class="cake-tier cake-top"></div>
                <div class="cake-tier cake-mid"></div>
                <div class="cake-tier cake-bot"></div>
            </div>
            <p class="blow-hint" id="blow-hint">Click the candles to blow them out! 🌬️</p>
            <div class="birthday-message-box">
                <p class="birthday-typewriter" id="birthday-typewriter"></p>
            </div>
            <button id="universe-btn" class="cta-button universe-trigger-btn">Wait... what do you mean ME?! 😱</button>
        </div>
    </section>

    <!-- 4. Gallery View -->
    <section id="gallery-view" class="view">
        <div class="gallery-header">
            <h2 class="gallery-title">Memory Gallery 📸</h2>
            <button id="gallery-back-btn" class="nav-button">←</button>
        </div>
        <div id="gallery-grid" class="gallery-grid"></div>
    </section>

    <!-- 5. Universe Journey — Earth to Galaxy -->
    <section id="universe-view" class="view">
        <canvas id="universe-canvas"></canvas>
        <div class="universe-scroll-track"></div>
        <div id="universe-hud" class="universe-hud">
            <div id="universe-label" class="universe-label">🌍 Earth</div>
            <div id="universe-scroll-hint" class="universe-scroll-hint">↓ Scroll to journey through the cosmos</div>
        </div>
        <button id="universe-back-btn" class="universe-back-btn">← Back</button>
    </section>

    <!-- Lightbox Modal -->
    <div id="lightbox" class="lightbox">
        <span class="lightbox-close">&times;</span>
        <img class="lightbox-content" id="lightbox-img">
    </div>

</body>
</html>
